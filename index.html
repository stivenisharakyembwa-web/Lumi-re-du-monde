<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumière du Monde</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(to right, orange, gold);
    }

    header img {
      width: 120px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
    }

    nav {
      background: black;
      text-align: center;
      padding: 10px;
    }

    nav a {
      color: gold;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 30px 20px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 15px;
    }

    .gallery img {
      width: 100%;
      max-width: 1000px;
      border-radius: 10px;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <img src="logo.png" alt="Logo">
    <h1>LUMIÈRE DU MONDE</h1>
    <p>Votre expert en électricité à Goma ⚡</p>
  </header>

  <!-- MENU -->
  <nav>
    <a href="#">Accueil</a>
    <a href="#services">Services</a>
    <a href="#realisations">Réalisations</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- SERVICES -->
  <section id="services">
    <h2>Nos services</h2>
    <p>Installation électrique • Dépannage • Conseils • Compteurs</p>
  </section>

  <!-- WHATSAPP -->
  <section id="contact">
    <h2>Contactez-nous</h2>
    <a class="btn" href="https://wa.me/243990916670">📱 Écrire sur WhatsApp</a>
  </section>

  <!-- GALERIE -->
  <section id="realisations" class="gallery">
    <h2>Nos réalisations</h2>
    <img src="galerie.jpg" alt="Nos réalisations">
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Lumière du Monde - Confiance • Sécurité • Qualité</p>
  </footer>

</body>
</html>
